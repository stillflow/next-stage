    <!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>あなたの続き</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f3f3f3;
      color: #222;
    }

    .wrap {
      max-width: 520px;
      margin: 32px auto;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 28px 20px 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 700;
    }

    .label {
      font-size: 16px;
      color: #666;
      margin-bottom: 12px;
    }

    .next-box {
      background: #f0f0f0;
      border-radius: 20px;
      padding: 24px 18px;
      font-size: 18px;
      line-height: 1.8;
      min-height: 180px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 18px 16px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 18px;
    }

    .btn-edit {
      background: #1f1f1f;
      color: #fff;
    }

    .editor {
      display: none;
      margin-top: 18px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      line-height: 1.7;
      resize: vertical;
      font-family: sans-serif;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .half {
      flex: 1;
    }

    .btn-save {
      background: #dfe4ff;
      color: #222;
    }

    .btn-cancel {
      background: #ececec;
      color: #222;
    }

    @media (max-width: 480px) {
      .wrap {
        margin: 16px auto;
        padding: 12px;
      }

      .card {
        padding: 24px 16px 20px;
      }

      h1 {
        font-size: 24px;
      }

      .next-box,
      textarea {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>あなたの続き</h1>
      <div class="label">次の一歩</div>

      <div id="nextBox" class="next-box"></div>

      <button id="editBtn" class="btn btn-edit">編集する</button>

      <div id="editor" class="editor">
        <textarea id="inputBox" placeholder="次の一歩を1つだけ書く"></textarea>
        <div class="row">
          <button id="saveBtn" class="btn btn-save half">保存する</button>
          <button id="cancelBtn" class="btn btn-cancel half">戻る</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "next_step_text";

    const nextBox = document.getElementById("nextBox");
    const editBtn = document.getElementById("editBtn");
    const editor = document.getElementById("editor");
    const inputBox = document.getElementById("inputBox");
    const saveBtn = document.getElementById("saveBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    function loadText() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved && saved.trim() !== "") {
        nextBox.textContent = saved;
      } else {
        nextBox.textContent = "次の一歩を、ここに1つだけ残しておく。";
      }
    }

    function openEditor() {
      const current = localStorage.getItem(STORAGE_KEY) || "";
      inputBox.value = current;
      editor.style.display = "block";
      editBtn.style.display = "none";
      inputBox.focus();
    }

    function closeEditor() {
      editor.style.display = "none";
      editBtn.style.display = "block";
    }

    saveBtn.addEventListener("click", () => {
      const text = inputBox.value.trim();
      localStorage.setItem(STORAGE_KEY, text);
      loadText();
      closeEditor();
    });

    cancelBtn.addEventListener("click", () => {
      closeEditor();
    });

    editBtn.addEventListener("click", () => {
      openEditor();
    });

    loadText();
  </script>
</body>
</html>
